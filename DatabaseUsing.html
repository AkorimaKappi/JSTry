<!DOCTYPE html>
<html lang="en">
<style>
    .undisplay {
        display: none;
    }
</style>

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>UsersDatabase</title>
</head>

<body>
    <h1>
        Database
    </h1>
    <div id="firstScreen">
        <button onclick="moveToLoginScreen()" id="loginButton">Log In</button><br><br>
        <button onclick="moveToRegisterScreen()" id="registerButton">Registrate</button>
    </div>
    <div id="loginScreen" class="undisplay">
        <input type="text" id="loginUsername" placeholder="Username"><br><br>
        <input type="password" id="loginPassword" placeholder="Password"><br><br>
        <button onclick="loginUser()">Log In</button><br><br>
        <button onclick="returnToFirstScreen(loginScreen)">Back</button>
    </div>
    <div id="registerScreen" class="undisplay">
        <input type="text" id="registerUsername" placeholder="Username"><br><br>
        <input type="text" id="registerFullName" placeholder="Full Name"><br><br>
        <input type="text" id="registerEmail" placeholder="Email"><br><br>
        <input type="number" id="registerAge" placeholder="Age"><br><br>
        <input type="password" id="registerPassword" placeholder="Password"><br><br>
        <input type="password" id="registerConfirmPassword" placeholder="Confirm Password"><br><br>
        <button onclick="registerUser()">Register</button><br><br>
        <button onclick="returnToFirstScreen(registerScreen)">Back</button>
    </div>
    <div id="loginedUserScreen" class="undisplay">
        <button onclick="moveToShowAllUsersScreen()">Show All Users</button><br><br>
        <button onclick="moveToShowUserScreen()">Show User by ID/Username</button><br><br>
        <button onclick="moveToDeleteUserScreen()">Delete User by ID/Username</button><br><br>
        <button onclick="returnToFirstScreen(loginedUserScreen)">Log Out</button><br><br>
    </div>
    <div id="deleteUserScreen" class="undisplay">
        <input type="text" id="deleteUserInput" placeholder="ID or Username"><br><br>
        <button onclick="deleteUser()">Delete</button><br><br>
        <button onclick="returnToLoginnedScreen(deleteUserScreen)">Back</button><br><br>
    </div>
    <div id="showUserScreen" class="undisplay">
        <ul id="userShower"></ul>
        <input type="text" id="userDefiner" placeholder="ID or Username"><br><br>
        <button onclick="showUser()">Show</button>
        <button onclick="returnToLoginnedScreen(showUserScreen),clearUserShower()">Back</button><br><br>

    </div>
    <div id="showAllUsersScreen" class="undisplay">
        <ul id="usersList"></ul>
        <button onclick="showUsers()">Show</button>
        <button onclick="returnToLoginnedScreen(showAllUsersScreen),clearUsersList()">Back</button><br><br>
    </div>

    <script src="UsersAllowance.js"></script>
</body>

</html>
